<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator App</title>
    <link rel="stylesheet" href="calc.css">
    <script src="calcu.js" defer></script>
</head>
<body>
   <main class="main-wrapper">
    <article class="calculator">
        <section class="calc-screen">
            <input type="text" readonly name="screen" class="screen" value="2">

        </section>

        <section class="calc-buttons" data-state="leftSide">
            <button type="button" class="button" data-number="7">7</button>
            <button type="button" class="button" data-number="8">8</button>
            <button type="button" class="button" data-number="9">9</button>
            <button type="button" class="button" id="operator" data-operator="divide">÷</button>

            <button type="button" class="button" data-number="4">4</button>
            <button type="button" class="button" data-number="5">5</button>
            <button type="button" class="button" data-number="6">6</button>
            <button type="button" class="button" id="operator" data-operator="multiply">X</button>

            <button type="button" class="button" data-number="1">1</button>
            <button type="button" class="button" data-number="2">2</button>
            <button type="button" class="button" data-number="3">3</button>
            <button type="button" class="button" id="operator" data-operator="substract">-</button>

            <button type="button" class="button" data-number="0">0</button>
            <button type="button" class="button" data-number=".">.</button>
            <button type="button" class="button" id="operator" data-operator="equal">=</button>
            <button type="button" class="button" id="operator" data-operator="add">+</button>

            <button type="button" class="button" id="delete" data-deletion="delete">Delete</button>

            <button type="button" class="button" id="clear" data-deletion="clear">Clear</button>

            
        </section>
    </article>
   </main> 
</body>
</html>
