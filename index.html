<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
   <main class="mian-wrapper">
    <article class="calculator">
        <section class="calc-screen">
            <div class="screen">

            </div>

        </section>

        <section class="calc-buttons">
            <button type="button" class="button" data-number="number">7</button>
            <button type="button" class="button" data-number="number">8</button>
            <button type="button" class="button" data-number="number">9</button>
            <button type="button" class="button" data-operator="division">÷</button>

            <button type="button" class="button" data-number="number">4</button>
            <button type="button" class="button" data-number="number">5</button>
            <button type="button" class="button" data-number="number">6</button>
            <button type="button" class="button" data-operator="multipication">X</button>

            <button type="button" class="button" data-number="number">1</button>
            <button type="button" class="button" data-number="number">2</button>
            <button type="button" class="button" data-number="number">3</button>
            <button type="button" class="button" data-operator="substraction">-</button>

            <button type="button" class="button" data-number="number">0</button>
            <button type="button" class="button" data-number="decimal">.</button>
            <button type="button" class="button" data-operator="equal">=</button>
            <button type="button" class="button" data-operator="addition">+</button>

            
        </section>
    </article>
   </main> 
</body>
</html>
